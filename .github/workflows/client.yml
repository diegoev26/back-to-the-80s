name: Deploy Client (Cloudflare Page)

on:
  push:
    branches: [main, master]
    paths:
      - "client/**"
      - "shared/**"
      - ".github/workflows/client.yml"

jobs:
  deploy:
    if: github.repository != vars.TEMPLATE_REPO
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_PUBLIC_URL }}
      NEXT_PUBLIC_ASSETS_URL: ${{ vars.NEXT_PUBLIC_ASSETS_URL }}
      NEXT_PUBLIC_API_SERVERLESS_URL: ${{ vars.NEXT_PUBLIC_API_SERVERLESS_URL }}
      NEXT_PUBLIC_API_SERVERLESS_AUTH: ${{ secrets.NEXT_PUBLIC_API_SERVERLESS_AUTH }}
      NEXT_PUBLIC_API_ROUTES_SERVERLESS_IMAGES_URL: ${{ vars.NEXT_PUBLIC_API_ROUTES_SERVERLESS_IMAGES_URL }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: Compilar paquete Shared
        run: npm run build:shared

      - name: Compilar paquete Client
        run: npm run build:client-pages

      - name: Generar wrangler.toml desde template
        working-directory: client
        run: |
          sed \
            -e "s|__NEXT_PUBLIC_PUBLIC_URL__|${NEXT_PUBLIC_PUBLIC_URL}|g" \
            -e "s|__NEXT_PUBLIC_ASSETS_URL__|${NEXT_PUBLIC_ASSETS_URL}|g" \
            -e "s|__NEXT_PUBLIC_API_SERVERLESS_URL__|${NEXT_PUBLIC_API_SERVERLESS_URL}|g" \
            -e "s|__NEXT_PUBLIC_API_SERVERLESS_AUTH__|${NEXT_PUBLIC_API_SERVERLESS_AUTH}|g" \
            -e "s|__NEXT_PUBLIC_API_ROUTES_SERVERLESS_IMAGES_URL__|${NEXT_PUBLIC_API_ROUTES_SERVERLESS_IMAGES_URL}|g" \
            wrangler.toml.template > wrangler.toml

      - name: Desplegar en Cloudflare Pages
        working-directory: client
        run: npx wrangler pages deploy --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
