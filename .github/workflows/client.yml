name: Deploy Client (Cloudflare Page)

on:
  push:
    branches: [main, master]
    paths:
      - "client/**"
      - "shared/**"
      - ".github/workflows/client.yml"

jobs:
  deploy:
    if: github.repository != vars.TEMPLATE_REPO
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: Compilar paquete Shared
        run: npm run build:shared

      - name: Compilar paquete Client
        run: npm run build:client-pages

      - name: Desplegar en Cloudflare Pages
        working-directory: client
        run: npx wrangler pages deploy --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
