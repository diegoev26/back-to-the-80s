name: Deploy Serverless (Cloudflare Worker)

on:
  push:
    branches: [main, master]
    paths:
      - "serverless/**"
      - "shared/**"
      - ".github/workflows/serverless-worker.yml"

jobs:
  deploy:
    if: github.repository != 'diegoev26/template'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: Compilar paquete Shared
        run: npm run build:shared

      - name: Desplegar en Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "serverless"
          command: deploy
